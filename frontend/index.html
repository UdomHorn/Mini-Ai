<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talk to AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/vendor/highlight/styles/github.min.css" id="hljs-light-theme" />
    <link rel="stylesheet" href="/vendor/highlight/styles/github-dark.min.css" id="hljs-dark-theme" disabled />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Mini AI Assistant</p>
          <h1 id="chat-title">Talk to AI</h1>
        </div>
        <div class="header-actions">
          <button id="history-toggle" class="ghost-button history-button" type="button" aria-label="Open history">
            <span class="history-button-icon" aria-hidden="true">History</span>
            <span id="history-count" class="history-count">0</span>
          </button>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">
            <span class="theme-toggle-track">
              <span class="theme-toggle-thumb"></span>
            </span>
            <span id="theme-label">Dark Mode</span>
          </button>
        </div>
      </header>

      <main class="chat-layout">
        <div class="quick-actions">
          <button
            id="quick-actions-toggle"
            class="quick-actions-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="quick-actions-menu"
            aria-label="Open quick actions"
          >
            <span class="quick-actions-plus">+</span>
          </button>
          <div id="quick-actions-menu" class="quick-actions-menu hidden">
            <button class="quick-action-button active" type="button" data-prompt="Help me learn coding for my idea and guide the next steps.">
              <span class="quick-action-icon" aria-hidden="true">Talk</span>
              <span>Talk to AI</span>
            </button>
            <button class="quick-action-button" type="button" data-prompt="Explain this code clearly, step by step, and tell me what each part does.">
              <span class="quick-action-icon" aria-hidden="true">?</span>
              <span>Explain Code</span>
            </button>
          </div>
        </div>
        <button id="clear-chat" class="ghost-button clear-chat-floating" type="button">Clear Chat</button>
        <section id="chat-container" class="chat-container" aria-live="polite"></section>
      </main>

      <form id="chat-form" class="chat-form">
        <label class="sr-only" for="prompt-input">Ask Learn Coding With AI</label>
        <textarea
          id="prompt-input"
          name="prompt"
          rows="1"
          maxlength="6000"
          placeholder="Ask Learn Coding With AI..."
        ></textarea>
        <button id="submit-button" type="submit">Send</button>
      </form>

      <div id="language-picker-overlay" class="language-picker-overlay hidden" aria-hidden="true">
        <div class="language-picker" role="dialog" aria-modal="true" aria-labelledby="language-picker-title">
          <div class="language-picker-header">
            <div>
              <p class="eyebrow">Code Generator</p>
              <h2 id="language-picker-title">Choose A Language</h2>
            </div>
            <button id="close-language-picker" class="ghost-button" type="button">Close</button>
          </div>
          <p class="language-picker-copy">Pick the language you want Mini AI Assistant to generate for your prompt.</p>
          <div id="language-picker-grid" class="language-picker-grid"></div>
        </div>
      </div>

      <div id="history-overlay" class="history-overlay hidden" aria-hidden="true">
        <aside class="history-panel" role="dialog" aria-modal="true" aria-labelledby="history-title">
          <div class="history-panel-header">
            <div>
              <p class="eyebrow">Local History</p>
              <h2 id="history-title">Conversation History</h2>
            </div>
            <button id="close-history" class="ghost-button" type="button">Close</button>
          </div>
          <p class="history-copy">Your questions and AI answers are stored in this browser on your local machine.</p>
          <div id="history-list" class="history-list"></div>
        </aside>
      </div>
    </div>

    <template id="empty-state-template">
      <div class="empty-state">
        <p class="empty-state-kicker">Start Chat</p>
        <h2>Learn Coding With AI.</h2>
      </div>
    </template>

    <script src="/vendor/marked/marked.umd.js"></script>
    <script src="/vendor/highlight/highlight.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
